services:
  server:
    build: ./server
    container_name: redbyte-server
    ports:
      - "9000:9000"
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    container_name: redbyte-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - server

volumes:
  caddy_data:
